{% extends 'shop/basic.html' %}

{% block title %}Password Reset Complete - MCart{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Password Reset Complete</h3>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="bi bi-check-circle" style="font-size: 3rem; color: #28a745;"></i>
                    </div>
                    <h5>Success!</h5>
                    <p class="text-muted">
                        Your password has been successfully reset. You can now log in with your new password.
                    </p>
                    
                    <div class="mt-4">
                        <a href="{% url 'shop:website_login' %}" class="btn btn-primary">Login Now</a>
                        <a href="{% url 'shop:home' %}" class="btn btn-outline-secondary">Go Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
